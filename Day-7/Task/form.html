<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form</title>
</head>
<body>
  <main>
    <h1>Application Form</h1>
    <form>
      <label for="Username">Enter Your Name: </label><br>
      <input type="text" id="Username" required><br><br>

      <label for="Userage" >Enter Your Age: </label><br>
      <input type="number" id="Userage" required><br><br>

      <label for="Useremail">Enter your Email:</label><br>
      <input type="email" id="Username" required><br><br>

      <label for="Userpassword">Enter Your Password:</label><br>
      <input type="password" id="Userpassword" required><br><br>

      <label for="Usernumber">Enter Your Number: </label><br>
      <input type="tel" id="Usernumber" required><br><br>

      <label for="Usergender">Gender:</label><br>
      <input type="radio" name="gender" id="Usergender">Male
      <input type="radio" name="gender" id="Usergender">Female
      <input type="radio" name="gender" id="Usergender">Transgender
      <input type="radio" name="gender" id="Usergender">other <br><br>

      <label for="Userskill">Skills</label><br>
      <input type="checkbox" name="Skills" id="Userskill">HTML
      <input type="checkbox" name="Skills" id="Userskill">CSS
      <input type="checkbox" name="Skills" id="Userskill">JS
      <input type="checkbox" name="Skills" id="Userskill">React <br><br>

      <label for="Usercourse">Course</label><br>
      <select id="Usercourse">
        <option value="">---Select One---</option>
        <option value="html">Fontend Developer</option>
        <option value="html">Backend Developer</option>
        <option value="html">FullStack Developer</option>
        <option value="html">Cyber Security</option> 
      </select><br><br>

      <label for="Register">Choose File</label><br>
      <input type="file" value="Register"><br><br>

      <input type="submit" value="Apply">
      <input type="reset" value="Reset">

    </form>
  </main>
</body>
</html>
