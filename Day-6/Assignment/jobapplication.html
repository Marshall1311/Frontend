<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Form</title>
</head>
<body>
  <main>
    <h1>Job Application Form</h1>
    <label for="">Full Name:</label><br>
    <input type="text" placeholder="Enter your Name" required><br><br>
    <label for="">Email:</label><br>
    <input type="text" placeholder="Enter your Email" required><br><br>
    <label for="">Phone Number:</label><br>
    <input type="number" placeholder="Enter your Number" required><br><br>
    <label for="">Date of Birth:</label><br>
    <input type="date" ><br><br>
    <label for="">Gender: </label><br>
    <input type="radio" name="Usergender">Male
    <input type="radio" name="Usergender">Female
    <input type="radio" name="Usergender">Other <br><br>
    <label>Address:</label><br>
    <textarea rows="5" cols="30"></textarea><br><br>

    <label>Highest Qualification:</label><br>
    <select name="qualification">
        <option>High School</option>
        <option>Diploma</option>
        <option>Undergraduate</option>
        <option>Postgraduate</option>
    </select>
    <br><br>

    <label>Skills:</label><br>
    <input type="checkbox" name="skills" value="HTML"> HTML
    <input type="checkbox" name="skills" value="CSS"> CSS
    <input type="checkbox" name="skills" value="JavaScript"> JavaScript
    <input type="checkbox" name="skills" value="Python"> Python
    <br><br>

    <label>Upload Resume:</label><br>
    <input type="file" name="resume"><br><br>

    <input type="submit" value="Apply">
    <input type="reset" value="Reset">

  </main>
</body>
</html>
